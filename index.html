<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Titan Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-gym-black { background-color: #0a0a0a; }
        .bg-gym-gold { background-color: #FFC107; }
        .key-btn { background-color: #1a1a1a; color: white; border: 1px solid #333; border-radius: 4px; transition: all 0.1s; }
        .key-btn:active { background-color: #FFC107; color: black; transform: scale(0.98); }
    </style>
</head>
<body class="bg-gym-black min-h-screen flex items-center justify-center p-2">

    <div class="w-full max-w-sm bg-zinc-900 border-2 border-zinc-800 shadow-2xl overflow-hidden rounded-md">
        <div class="pt-6 pb-4 text-center border-b border-zinc-800">
            <h1 class="font-black text-xl uppercase italic tracking-tighter text-white">
                Titan<span class="text-gym-gold">Gym</span>
            </h1>
        </div>

        <div class="p-6 min-h-[400px] flex flex-col justify-center">
            <div id="state-input" class="space-y-6">
                <div class="bg-black p-3 border border-zinc-700 text-center">
                    <input type="text" id="cpf-display" readonly placeholder="CPF" class="bg-transparent text-white text-2xl font-mono text-center w-full outline-none">
                </div>
                <div class="grid grid-cols-3 gap-2" id="teclado">
                    </div>
            </div>

            <div id="state-loading" class="hidden text-center text-gym-gold">Verificando...</div>

            <div id="state-active" class="hidden text-center space-y-4">
                <div class="border-2 border-green-500 p-6 bg-zinc-800/50">
                    <h2 class="text-green-500 font-black text-3xl uppercase">Ativo</h2>
                    <p id="welcome-name" class="text-white uppercase italic"></p>
                </div>
                <button onclick="resetTotem()" class="text-zinc-500 text-[10px] font-bold uppercase">Voltar</button>
            </div>

            <div id="state-blocked" class="hidden text-center space-y-4">
                <div class="border-2 border-red-500 p-6 bg-zinc-800/50">
                    <h2 id="error-title" class="text-red-500 font-black text-2xl uppercase">Bloqueado</h2>
                    <p id="error-msg" class="text-white text-[11px] uppercase">Vá à recepção</p>
                </div>
                <button onclick="resetTotem()" class="text-zinc-500 text-[10px] font-bold uppercase">Voltar</button>
            </div>
        </div>
    </div>
</body>
</html>
